alloy:
  controller:
    type: deployment
    replicas: 1
    podAnnotations: {}
    nodeSelector: {}
    tolerations: []
    affinity: {}

  alloy:
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: 1000m
        memory: 1Gi

    configMap:
      create: true
      content: |
        discovery.kubernetes "pods" {
          role = "pod"
        }

        discovery.relabel "pods" {
          targets = discovery.kubernetes.pods.targets

          rule {
            source_labels = ["__meta_kubernetes_namespace"]
            target_label  = "namespace"
          }
          rule {
            source_labels = ["__meta_kubernetes_pod_name"]
            target_label  = "pod"
          }
          rule {
            source_labels = ["__meta_kubernetes_pod_container_name"]
            target_label  = "container"
          }
          rule {
            source_labels = ["__meta_kubernetes_pod_label_app_kubernetes_io_name"]
            target_label  = "app"
          }
          rule {
            source_labels = ["__meta_kubernetes_pod_node_name"]
            target_label  = "node"
          }
          rule {
            action       = "replace"
            replacement  = "baykar-case"
            target_label = "cluster"
          }
        }

        loki.source.kubernetes "pod_logs" {
          targets    = discovery.relabel.pods.output
          forward_to = [loki.write.local.receiver]
        }

        loki.write "local" {
          endpoint {
            url = "http://baykar-case-loki-gateway.loki.svc.cluster.local/loki/api/v1/push"
          }
          external_labels = {
            cluster = "baykar-case",
          }
        }

  configReloader:
    enabled: true
    resources:
      requests:
        cpu: 10m
        memory: 32Mi
      limits:
        memory: 64Mi

  serviceAccount:
    create: true
    additionalLabels: {}

  rbac:
    create: true

  service:
    enabled: true
