vault:

  global:
    namespace: "vault"
    tlsDisable: true
    serverTelemetry:
      prometheusOperator: false

  injector:
    enabled: false
    replicas: 1
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 256Mi
    metrics:
      enabled: true

  server:
    image:
      repository: "hashicorp/vault"
      tag: "1.21.2"

    resources:
      requests:
        cpu: 500m
        memory: 512Mi
      limits:
        cpu: 2000m
        memory: 1024Mi

    readinessProbe:
      enabled: true
      path: "/v1/sys/health?standbyok=true&sealedcode=204&uninitcode=204"
      port: 8200
      failureThreshold: 2
      initialDelaySeconds: 5
      periodSeconds: 5
      successThreshold: 1
      timeoutSeconds: 3

    livenessProbe:
      enabled: false
      path: "/v1/sys/health?standbyok=true"
      port: 8200
      failureThreshold: 3
      initialDelaySeconds: 30
      periodSeconds: 10
      successThreshold: 1
      timeoutSeconds: 5

    ingress:
      enabled: true
      ingressClassName: nginx
      annotations:
        cert-manager.io/cluster-issuer: "letsencrypt-prod"
        nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
      hosts:
        - host: vault.myturkishdish.com
          paths: []
      tls:
        - secretName: vault-tls
          hosts:
            - vault.myturkishdish.com

    dataStorage:
      enabled: true
      size: 2Gi
      storageClass: local-path
      accessMode: ReadWriteOnce

    auditStorage:
      enabled: true
      size: 3Gi
      storageClass: local-path
      accessMode: ReadWriteOnce

    standalone:
      enabled: true
      config: |
        ui = true

        listener "tcp" {
          tls_disable = 1
          address = "[::]:8200"
          cluster_address = "[::]:8201"
          telemetry {
            unauthenticated_metrics_access = "true"
          }
        }

        storage "file" {
          path = "/vault/data"
        }

        telemetry {
          prometheus_retention_time = "30s"
          disable_hostname = true
        }

    # Phase 1: Single replica, no retry_join - init first
    # Phase 2: Scale to 3 replicas with retry_join and auto-unseal after init
    ha:
      enabled: false
      
    affinity: ""

    authDelegator:
      enabled: false

    serviceAccount:
      create: true

    networkPolicy:
      enabled: false

  # Prometheus ServiceMonitor
  serverTelemetry:
    serviceMonitor:
      enabled: false
      selectors:
        release: baykar-case-kube-prometheus-stack
      interval: 30s
      scrapeTimeout: 10s

  ui:
    enabled: true
