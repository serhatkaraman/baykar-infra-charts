kube-prometheus-stack:

  namespaceOverride: monitoring

  prometheus:
    prometheusSpec:
      additionalScrapeConfigs: |
        - job_name: 'kubernetes-pod'
          kubernetes_sd_configs:
            - role: pod
          relabel_configs:
            - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
              action: keep
              regex: true
            - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
              action: replace
              target_label: __metrics_path__
              regex: (.+)
            - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
              action: replace
              regex: ([^:]+)(?::\d+)?;(\d+)
              replacement: $1:$2
              target_label: __address__
            - action: labelmap
              regex: __meta_kubernetes_pod_label_(.+)
            - source_labels: [__meta_kubernetes_namespace]
              action: replace
              target_label: kubernetes_namespace
            - source_labels: [__meta_kubernetes_pod_name]
              action: replace
              target_label: kubernetes_pod_name
        - job_name: 'kubernetes-services'
          kubernetes_sd_configs:
            - role: endpoints
          relabel_configs:
            - source_labels: [__meta_kubernetes_service_annotation_prometheus_io_scrape]
              action: keep
              regex: true
            - source_labels: [__meta_kubernetes_service_annotation_prometheus_io_scheme]
              action: replace
              target_label: __scheme__
              regex: (https?)
            - source_labels: [__meta_kubernetes_service_annotation_prometheus_io_path]
              action: replace
              target_label: __metrics_path__
              regex: (.+)
            - source_labels: [__address__, __meta_kubernetes_service_annotation_prometheus_io_port]
              action: replace
              target_label: __address__
              regex: ([^:]+)(?::\d+)?;(\d+)
              replacement: $1:$2
            - action: labelmap
              regex: __meta_kubernetes_service_label_(.+)
            - source_labels: [__meta_kubernetes_service_name]
              action: replace
              target_label: job
            - action: replace
              source_labels:
              - __meta_kubernetes_pod_node_name
              target_label: kubernetes_node
            - source_labels: [__meta_kubernetes_namespace]
              action: replace
              target_label: kubernetes_namespace
        - job_name: 'kubernetes-cadvisor'
          kubernetes_sd_configs:
          - role: node
          scheme: https
          metrics_path: /metrics/cadvisor
          tls_config:
            insecure_skip_verify: true
            ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
          bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
          relabel_configs:
          - action: labelmap
            regex: __meta_kubernetes_node_label_(.+)
          metric_relabel_configs:
          - source_labels:
              - namespace
            action: replace
            target_label: kubernetes_namespace
          - source_labels:
            - pod
            regex: (.*)
            replacement: $1
            action: replace
            target_label: pod_name
          - source_labels:
            - container
            regex: (.*)
            replacement: $1
            action: replace
            target_label: container_name
        - job_name: 'kubernetes-apiservers'
          kubernetes_sd_configs:
          - role: endpoints
          scheme: https
          tls_config:
            ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
            insecure_skip_verify: true
          bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
          relabel_configs:
          - source_labels: [__meta_kubernetes_namespace, __meta_kubernetes_service_name, __meta_kubernetes_endpoint_port_name]
            action: keep
            regex: default;kubernetes;https
          - replacement: apiserver
            action: replace
            target_label: job
      replicas: 1
      shards: 1
      retention: 15d
      retentionSize: 50GB
      externalLabels:
        cluster: baykar-case
      serviceMonitorSelectorNilUsesHelmValues: false
      resources:
        requests:
          cpu: 250m
          memory: 1024Mi
        limits:
          cpu: 1000m
          memory: 2048Mi
      storageSpec:
        volumeClaimTemplate:
          spec:
            storageClassName: local-path
            accessModes: ["ReadWriteOnce"]
            resources:
              requests:
                storage: 3Gi
    service:
      type: ClusterIP

  grafana:
    namespaceOverride: monitoring
    adminPassword: <path:secret/data/argocd#grafana_admin_password>
    sidecar:
      datasources:
        defaultDatasourceEnabled: true
        searchNamespace: ALL
      dashboards:
        enabled: true
        searchNamespace: ALL
    additionalDataSources:
      - name: Loki
        type: loki
        uid: loki
        url: http://baykar-case-loki-gateway.loki.svc.cluster.local
        access: proxy
        isDefault: false
        jsonData:
          httpMethod: GET
          timeout: 60
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
    persistence:
      enabled: true
      size: 3Gi
      accessModes:
        - ReadWriteOnce
      storageClassName: local-path
    ingress:
      enabled: true
      ingressClassName: internal-ingress-nginx
      hosts:
        - grafana.myturkishdish.com
      tls:
        - secretName: grafana-tls
          hosts:
            - grafana.myturkishdish.com

  defaultRules:
    create: true
    rules:
      etcd: false
      kubeApiserverAvailability: false
      kubeApiserverBurnrate: false
      kubeApiserverHistogram: false
      kubeApiserverSlos: false
      kubeControllerManager: false
      kubeProxy: false
      kubeSchedulerAlerting: false
      kubeSchedulerRecording: false
      windows: false

  additionalPrometheusRulesMap:
    rule-name:
      groups:
      - name: additional.rules
        rules:
        - alert: KubernetesContainerOomKiller
          expr: (kube_pod_container_status_restarts_total - kube_pod_container_status_restarts_total offset 10m >= 1) and ignoring (reason) min_over_time(kube_pod_container_status_last_terminated_reason{reason="OOMKilled"}[10m]) == 1
          for: 0m
          labels:
            severity: warning
          annotations:
            summary: Kubernetes Container oom killer (instance {{ $labels.instance }})
            description: "Container {{ $labels.container }} in pod {{ $labels.namespace }}/{{ $labels.pod }} has been OOMKilled {{ $value }} times in the last 10 minutes.\n  VALUE = {{ $value }}\n  LABELS = {{ $labels }}"
        - alert: PodFrequentlyRestarting
          expr: increase(kube_pod_container_status_restarts_total[1h]) > 3
          for: 10m
          labels:
            severity: warning
          annotations:
            description: Pod {{$labels.namespaces}}/{{$labels.pod}} restarted {{$value}} times within the last hour
            summary: Pod is restarting frequently
        - alert: KubernetesVolumeOutOfDiskSpace
          expr: kubelet_volume_stats_available_bytes / kubelet_volume_stats_capacity_bytes * 100 < 25
          for: 2m
          labels:
            severity: warning
          annotations:
            summary: Kubernetes Volume out of disk space (instance {{ $labels.instance }})
            description: "Volume is almost full (< 25% left)\n  VALUE = {{ $value }}\n  LABELS = {{ $labels }}"
        - alert: KubernetesVolumeFullInFourDays
          expr: predict_linear(kubelet_volume_stats_available_bytes[6h:5m], 4 * 24 * 3600) < 0
          for: 0m
          labels:
            severity: critical
          annotations:
            summary: Kubernetes Volume full in four days (instance {{ $labels.instance }})
            description: "Volume under {{ $labels.namespace }}/{{ $labels.persistentvolumeclaim }} is expected to fill up within four days. Currently {{ $value | humanize }}% is available.\n  VALUE = {{ $value }}\n  LABELS = {{ $labels }}"
        - alert: KubernetesClientCertificateExpiresNextWeek
          expr: apiserver_client_certificate_expiration_seconds_count{job="apiserver"} > 0 and histogram_quantile(0.01, sum by (job, le) (rate(apiserver_client_certificate_expiration_seconds_bucket{job="apiserver"}[5m]))) < 7*24*60*60
          for: 0m
          labels:
            severity: warning
          annotations:
            summary: Kubernetes client certificate expires next week (instance {{ $labels.instance }})
            description: "A client certificate used to authenticate to the apiserver is expiring next week.\n  VALUE = {{ $value }}\n  LABELS = {{ $labels }}"

  kubeStateMetrics:
    enabled: true

  kube-state-metrics:
    namespaceOverride: monitoring
    image:
      tag: v2.14.0
    metricLabelsAllowlist:
      - pods=[*]
      - nodes=[*]

  alertmanager:
    enabled: true
    config:
      global:
        resolve_timeout: 5m
        slack_api_url: <path:secret/data/argocd#baykar-case-slack-api-url>
      inhibit_rules:
        - source_matchers:
            - 'severity = critical'
          target_matchers:
            - 'severity =~ warning|info'
          equal:
            - 'namespace'
            - 'alertname'
        - source_matchers:
            - 'severity = warning'
          target_matchers:
            - 'severity = info'
          equal:
            - 'namespace'
            - 'alertname'
        - source_matchers:
            - 'alertname = InfoInhibitor'
          target_matchers:
            - 'severity = info'
          equal:
            - 'namespace'
        - target_matchers:
            - 'alertname = InfoInhibitor'
      route:
        group_by: ['namespace']
        group_wait: 30s
        group_interval: 5m
        repeat_interval: 12h
        receiver: 'slack'
        routes:
        - matchers:
            - alertname = "Watchdog"
          receiver: 'null'
        - matchers:
            - alertname = "TargetDown"
          receiver: 'null'
        - matchers:
            - alertname = "KubeVersionMismatch"
          receiver: 'null'
        - matchers:
            - alertname = "PrometheusRuleFailures"
          receiver: 'null'
        - receiver: 'slack'
      receivers:
      - name: 'null'
      - name: 'slack'
        slack_configs:
        - channel: 'prometheus-alerts-baykar-case'
          send_resolved: true
          icon_url: https://avatars3.githubusercontent.com/u/3380462
          title: '{{ template "slack.default.title" . }}'
          title_link: ''
          text: >-
            {{ range .Alerts -}}
            *Alert:* {{ .Labels.alertname }} - {{ .Labels.severity }}
            *Description:* {{ .Annotations.description }}
            *Details:*
                {{ range .Labels.SortedPairs }} • *{{ .Name }}:* `{{ .Value }}`
              {{ end }}
            {{ end }}
      templates:
      - '/etc/alertmanager/config/*.tmpl'
    alertmanagerSpec:
      storage:
        volumeClaimTemplate:
          spec:
            storageClassName: local-path
            accessModes: ["ReadWriteOnce"]
            resources:
              requests:
                storage: 3Gi

  nodeExporter:
    enabled: true

  coreDns:
    enabled: false

  kubeApiServer:
    enabled: false

  kubeControllerManager:
    enabled: false

  kubeEtcd:
    enabled: false

  kubeProxy:
    enabled: false

  kubeScheduler:
    enabled: false

  kubelet:
    enabled: true
