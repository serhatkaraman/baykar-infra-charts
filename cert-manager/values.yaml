cert-manager:
  namespace: cert-manager

  crds:
    enabled: true
    keep: true

  replicaCount: 1

  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi

  webhook:
    replicaCount: 1
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 100m
        memory: 128Mi

  cainjector:
    replicaCount: 1
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 200m
        memory: 256Mi

  prometheus:
    enabled: true
    servicemonitor:
      enabled: true

clusterIssuer:
  email: srhtkrmn@gmail.com
  dnsZones:
    - myturkishdish.com
  groupName: acme.myturkishdish.com
