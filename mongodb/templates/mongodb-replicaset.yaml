apiVersion: v1
kind: Secret
metadata:
  name: mongodb-admin-password
  namespace: mongodb
type: Opaque
stringData:
  password: <path:secret/data/argocd#mongodb-password>
---
apiVersion: mongodbcommunity.mongodb.com/v1
kind: MongoDBCommunity
metadata:
  name: mongodb-replica-set
  namespace: mongodb
spec:
  members: 1
  type: ReplicaSet
  version: "8.0.4"
  security:
    tls:
      enabled: false
    authentication:
      modes: ["SCRAM"]
  users:
    - name: admin
      db: admin
      passwordSecretRef:
        name: mongodb-admin-password
      roles:
        - name: clusterAdmin
          db: admin
        - name: userAdminAnyDatabase
          db: admin
        - name: readWriteAnyDatabase
          db: admin
        - name: dbAdminAnyDatabase
          db: admin
      scramCredentialsSecretName: admin-scram
  additionalMongodConfig:
    systemLog:
      logRotate: rename
      logAppend: true
  statefulSet:
    spec:
      template:
        spec:
          containers:
            - name: log-cleanup
              image: busybox:1.36
              command:
                - sh
                - -c
                - |
                  while true; do
                    find /var/log/mongodb -name "*.log.*" -mtime +10 -delete 2>/dev/null || true
                    sleep 86400
                  done
              volumeMounts:
                - name: logs-volume
                  mountPath: /var/log/mongodb
              resources:
                requests:
                  cpu: 10m
                  memory: 16Mi
                limits:
                  cpu: 50m
                  memory: 32Mi
      volumeClaimTemplates:
        - metadata:
            name: data-volume
          spec:
            accessModes: ["ReadWriteOnce"]
            storageClassName: local-path
            resources:
              requests:
                storage: 3Gi
        - metadata:
            name: logs-volume
          spec:
            accessModes: ["ReadWriteOnce"]
            storageClassName: local-path
            resources:
              requests:
                storage: 3Gi
