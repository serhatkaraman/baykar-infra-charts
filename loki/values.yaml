loki:
  deploymentMode: SingleBinary

  loki:
    auth_enabled: false

    schemaConfig:
      configs:
        - from: "2024-04-01"
          store: tsdb
          object_store: filesystem
          schema: v13
          index:
            prefix: loki_index_
            period: 24h

    storage:
      type: filesystem

    commonConfig:
      replication_factor: 1
      ring:
        kvstore:
          store: inmemory

    pattern_ingester:
      enabled: false

    limits_config:
      retention_period: 7d
      allow_structured_metadata: true
      volume_enabled: true
      ingestion_rate_mb: 16
      ingestion_burst_size_mb: 32
      max_query_length: 0h
      max_query_parallelism: 32
      split_queries_by_interval: 15m
      reject_old_samples: true
      reject_old_samples_max_age: 168h

    compactor:
      retention_enabled: true
      delete_request_store: filesystem
      working_directory: /var/loki/compactor

    server:
      grpc_server_max_recv_msg_size: 33554432
      grpc_server_max_send_msg_size: 33554432

  singleBinary:
    replicas: 1
    persistence:
      enabled: true
      size: 3Gi
      storageClass: local-path
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
    readinessProbe:
      httpGet:
        path: /ready
        port: http-metrics
      initialDelaySeconds: 60
      periodSeconds: 10
      timeoutSeconds: 5
      successThreshold: 1
      failureThreshold: 30
    livenessProbe:
      httpGet:
        path: /ready
        port: http-metrics
      initialDelaySeconds: 180
      periodSeconds: 30
      timeoutSeconds: 5
      failureThreshold: 5

  read:
    replicas: 0
  write:
    replicas: 0
  backend:
    replicas: 0

  gateway:
    enabled: true
    replicas: 1
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 256Mi
    nginxConfig:
      resolver: "kube-dns.kube-system.svc.cluster.local."
    ingress:
      enabled: false

  monitoring:
    serviceMonitor:
      enabled: true
    selfMonitoring:
      enabled: false

  lokiCanary:
    enabled: false

  test:
    enabled: false

  chunksCache:
    enabled: false
  resultsCache:
    enabled: false
